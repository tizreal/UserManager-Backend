spring.application.name=UserManager

# ── Server Configuration ────────────────────────────────────── 
# Port the server listens on (default 8080) 
server.port=${PORT:8080} 
# All API endpoints will be prefixed with /api 
server.servlet.context-path=/api 
 
# ── Database Configuration ──────────────────────────────────── 
# Replace 'root' with your actual PostgreSQL password 
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
 
# ── JPA / Hibernate Configuration ───────────────────────────── 
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect 

# 'validate' checks your entity matches the DB table - does NOT modify the DB 
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
 
# ── JWT Configuration ───────────────────────────────────────── 
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=604800000 
 
# ── Mail Configuration ──────────────────────────────────────── 
# Replace with YOUR Gmail and Google App Password (Step 22) 
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000 
spring.mail.properties.mail.smtp.timeout=3000 
spring.mail.properties.mail.smtp.writetimeout=5000 
 
# ── Logging Configuration ───────────────────────────────────── 
logging.level.web=DEBUG 
logging.level.com.tca.UserManager=DEBUG 
logging.level.org.hibernate.type=INFO 
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n 
 
# ── Import YAML config file ──────────────────────────────────── 
spring.config.import=classpath:config.yml 