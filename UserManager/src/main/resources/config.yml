app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: 86400000
      refresh-expiration: 604800000
      issuer: 'BFN-TCA Bootcamp'
      audience: User Manager
      prefix: 'Bearer '
      excluded:
        urls: /user/login,/user/signup,/user/reset/*,/user/verify/email,/test/**,/error
  mail:
    from: "noreply@usermanager.com"
    verification-subject: "Verify your email address"
    reset-password-subject: "Reset your password"
  cors:
    allowed-origins:
      - ${CLIENT_URL:http://localhost:5173}
      
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

client:
  url: ${CLIENT_URL:http://localhost:5173}
  email:
    verify:
      param: user/verifyEmail
      expiration: 86_400_000
    reset:
      param: user/resetPassword
      expiration: 600_000